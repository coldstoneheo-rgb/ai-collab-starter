name: AI Multi-Agent PR Review
on:
  pull_request:
    types: [opened, reopened, synchronize]

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build RAG index
        run: python ai/context7/indexer.py

  router:
    needs: index
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.decide.outputs.mode }}
      enabled_agents: ${{ steps.decide.outputs.enabled_agents }}
      autofix_allowed: ${{ steps.decide.outputs.autofix_allowed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil
      - name: Run router decision
        id: decide
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🔍 Running router decision..."
          DECISION_OUTPUT="$(python - <<'PY'
          import json
          import os
          import sys

          # Add workspace to path
          sys.path.insert(0, os.getcwd())

          from ai.router import decide_mode

          # Run decision
          decision = decide_mode('.')

          # Log decision
          print(f"✅ Mode decided: {decision.mode}")
          print(f"✅ Enabled agents: {decision.enabled_agents}")
          print(f"✅ Autofix allowed: {decision.autofix_allowed}")
          print(f"✅ Reason: {decision.reason}")

          print(f"mode={decision.mode}")
          print(f"enabled_agents={json.dumps(decision.enabled_agents)}")
          print(f"autofix_allowed={'true' if decision.autofix_allowed else 'false'}")
          PY
          )"

          while IFS= read -r line; do
            case "$line" in
              mode=*|enabled_agents=*|autofix_allowed=*)
                echo "$line" >> "$GITHUB_OUTPUT"
                ;;
            esac
          done <<EOF
          $DECISION_OUTPUT
          EOF

  claude_review:
    needs: router
    if: contains(fromJson(needs.router.outputs.enabled_agents), 'claude')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil
      - name: Run Claude Review
        env:
          CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🤖 Running Claude PM Review (mode: ${{ needs.router.outputs.mode }})"
          python ai/runners/run_claude_review.py --pr-number ${{ github.event.pull_request.number }}
      - name: Comment result
        if: always()
        run: echo "✅ Claude review job completed"

  gemini_review:
    needs: [router, claude_review]
    if: contains(fromJson(needs.router.outputs.enabled_agents), 'gemini')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil
      - name: Run Gemini Review
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "🎨 Running Gemini UI/UX Review (mode: ${{ needs.router.outputs.mode }})"
          python ai/runners/run_gemini_review.py
      - name: Comment result
        if: always()
        run: echo "✅ Gemini review job completed"

  perplexity_review:
    needs: [router, claude_review, gemini_review]
    if: contains(fromJson(needs.router.outputs.enabled_agents), 'perplexity')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil
      - name: Run Perplexity Review
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: |
          echo "⚖️ Running Perplexity Compliance Review (mode: ${{ needs.router.outputs.mode }})"
          python ai/runners/run_perplexity_review.py
      - name: Comment result
        if: always()
        run: echo "✅ Perplexity review job completed"
