name: AI AutoFix (on push)
on:
  push:
    branches: [ main, master ]

jobs:
  autofix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml python-dateutil
      - name: Run AutoFix
        env:
          GPT_API_KEY: ${{ secrets.GPT_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python ai/runners/run_autofix.py
      - name: Report AutoFix Result
        run: |
          echo "✅ AutoFix check complete. Manual review required to apply changes."
          echo "ℹ️ Auto-push to main is disabled per CLAUDE.md §12.1."
