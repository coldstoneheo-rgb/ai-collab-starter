name: AI Nightly Report

on:
  schedule:
    # Run at 00:30 UTC every day
    - cron: '30 0 * * *'
  workflow_dispatch:
    inputs:
      day:
        description: 'Day to report (YYYY-MM-DD, default: today UTC)'
        required: false
        type: string

permissions:
  contents: read
  issues: write

jobs:
  nightly-report:
    runs-on: ubuntu-latest
    name: Generate nightly AI report

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
        env:
          PYTHONPATH: ${{ github.workspace }}

      - name: Generate daily summary
        id: daily-summary
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          if [ -n "${{ inputs.day }}" ]; then
            python scripts/daily_ai_report.py --day "${{ inputs.day }}"
          else
            python scripts/daily_ai_report.py
          fi

      - name: Check budget status
        id: budget-check
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: |
          python - <<'EOF'
          import os
          from ai.utils.cost_monitor import get_budget_status

          status = get_budget_status()

          print("## Budget Status")
          print(f"Monthly Budget: ${status['monthly_budget_usd']:.2f}")
          print(f"Spent: ${status['monthly_spent_usd']:.2f}")
          print(f"Remaining: ${status['remaining_usd']:.2f}")
          print(f"Usage: {status['usage_pct']:.1f}%")
          print()

          overbudget = max(0.0, status['monthly_spent_usd'] - status['monthly_budget_usd'])

          github_output = os.environ['GITHUB_OUTPUT']
          with open(github_output, 'a', encoding='utf-8') as fh:
              fh.write(f"is_over_budget={str(status['is_over_budget']).lower()}\n")
              fh.write(f"is_near_limit={str(status['is_near_limit']).lower()}\n")
              fh.write(f"usage_pct={status['usage_pct']:.1f}\n")
              fh.write(f"remaining_usd={status['remaining_usd']:.2f}\n")
              fh.write(f"spent_usd={status['monthly_spent_usd']:.2f}\n")
              fh.write(f"budget_usd={status['monthly_budget_usd']:.2f}\n")
              fh.write(f"overbudget_usd={overbudget:.2f}\n")

          print("## Per-Agent Costs")
          for agent, cost in status.get('agents', {}).items():
              print(f"- {agent}: ${cost:.4f}")
          EOF

      - name: Create budget warning issue (near limit)
        if: steps.budget-check.outputs.is_near_limit == 'true' && steps.budget-check.outputs.is_over_budget == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `⚠️ AI Budget Warning: ${context.payload.inputs?.day || 'Current'}`;
            const body = `## Budget Alert

            The AI automation budget is approaching its monthly limit:

            - **Usage**: ${{ steps.budget-check.outputs.usage_pct }}%
            - **Spent**: $${{ steps.budget-check.outputs.spent_usd }}
            - **Remaining**: $${{ steps.budget-check.outputs.remaining_usd }}

            ### Actions Required

            - [ ] Review recent AI activity in audit logs
            - [ ] Consider increasing monthly budget in \`.ai/budget.json\`
            - [ ] Monitor spend closely to avoid exhaustion

            ### Per-Agent Costs

            Check the workflow run for detailed breakdown.

            ---
            _Automated report from AI Nightly workflow_`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ai-budget-warning'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ai-budget-warning', 'automation']
              });
              console.log('Created budget warning issue');
            } else {
              console.log('Budget warning issue already exists');
            }

      - name: Create budget exhausted issue
        if: steps.budget-check.outputs.is_over_budget == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const title = `🚨 AI Budget EXHAUSTED: ${context.payload.inputs?.day || 'Current'}`;
            const body = `## Budget Exhausted

            The AI automation budget has been exhausted:

            - **Usage**: ${{ steps.budget-check.outputs.usage_pct }}%
            - **Spent**: $${{ steps.budget-check.outputs.spent_usd }}
            - **Budget**: $${{ steps.budget-check.outputs.budget_usd }}
            - **Over budget by**: $${{ steps.budget-check.outputs.overbudget_usd }}

            ### ⚠️ AI Automation Blocked

            All AI review workflows will fail until:

            1. Monthly budget is increased in \`.ai/budget.json\`, OR
            2. New month begins (automatic reset)

            ### Actions Required

            - [ ] Review audit logs to identify high-cost operations
            - [ ] Increase \`monthly_budget_usd\` in \`.ai/budget.json\` if needed
            - [ ] Consider optimizing prompts to reduce token usage
            - [ ] Evaluate whether \`lite\` mode should be enforced

            ---
            _Automated report from AI Nightly workflow_`;

            // Check if issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'ai-budget-exhausted'
            });

            if (issues.data.length === 0) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['ai-budget-exhausted', 'automation', 'urgent']
              });
              console.log('Created budget exhausted issue');
            } else {
              console.log('Budget exhausted issue already exists');
            }

      - name: Upload daily summary as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-summary-${{ inputs.day || 'today' }}
          path: ai/logs/*/daily_summary.json
          retention-days: 90
